<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - كربتو الخليج 💰</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script type="module" src="js/dashboard.js"></script>

  <!-- Glass Style -->

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #020617);
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .glass-light {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-glass:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    input, select {
      background: rgba(255,255,255,0.15) !important;
      color: white !important;
    }

    input::placeholder {
      color: #ddd;
    }
  </style>

</head>

<body class="text-white min-h-screen flex flex-col">

  <nav class="glass flex justify-between items-center px-4 py-3 m-3">

      <h1 class="text-lg font-bold">كربتو الخليج 💰</h1>
    </div>

```
<!-- معلومات المستخدم -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-xl font-bold mb-2 text-yellow-400">معلومات الحساب 👤</h2>
  <p id="userName"></p>
  <p id="userPhone"></p>
  <p id="userEmail"></p>
  <p id="walletId" class="font-bold mt-2"></p>
</div>

<!-- الرصيد -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-xl font-bold mb-2 text-green-400">💰 الرصيد الحالي</h2>
  <p id="balance" class="text-3xl font-extrabold">0 USDT</p>
</div>

<!-- الإيداع -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-xl font-bold text-yellow-400 mb-3">إيداع USDT 💵</h2>

  <div class="flex flex-col items-center">
    <img src="assets/usdt_qr.png" class="w-40 mb-3 rounded-lg shadow-lg">
    <p class="text-sm break-all mb-2">0x7F8125C197B845E1F0682A9846B94A11cA9d9743</p>

    <button id="copyAddress" class="btn-glass px-3 py-1 mb-3">📋 نسخ العنوان</button>

    <p class="text-xs text-gray-300 mb-3">
      Only send Tether (ERC20) assets
    </p>
  </div>

  <input id="depositAmount" type="number" placeholder="أدخل المبلغ"
    class="p-2 rounded-lg w-40 text-center mb-2">

  <br>

  <button id="depositBtn" class="bg-yellow-500 hover:bg-yellow-600 px-4 py-1 rounded-lg">
    تأكيد الإيداع
  </button>
</div>

<!-- السحب -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-xl font-bold text-yellow-400 mb-3">سحب USDT 💸</h2>

  <div class="flex flex-col gap-2">
    <input id="withdrawAmount" type="number" placeholder="أدخل المبلغ" class="p-2 rounded-lg">
    <input id="withdrawAddress" type="text" placeholder="أدخل عنوان محفظتك" class="p-2 rounded-lg">

    <button id="withdrawBtn" class="bg-yellow-500 hover:bg-yellow-600 py-2 rounded-lg mt-2">
      تأكيد السحب
    </button>
  </div>
</div>

<!-- التداول -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-xl font-bold text-yellow-400 mb-3">منصة التداول 📈</h2>

  <div class="flex flex-col gap-3">

    <div class="flex flex-col sm:flex-row gap-2 items-center">
      <select id="tradeAsset" class="p-2 rounded-lg w-full sm:w-1/3">
        <option>BTC</option>
        <option>ETH</option>
        <option>USDT</option>
      </select>

      <input id="tradeAmount" type="number" placeholder="الكمية"
        class="p-2 rounded-lg w-full sm:w-1/3 text-center">

      <button id="buyBtn" class="bg-green-600 hover:bg-green-700 px-4 py-1 rounded-lg w-full sm:w-auto">
        شراء
      </button>

      <button id="sellBtn" class="bg-red-600 hover:bg-red-700 px-4 py-1 rounded-lg w-full sm:w-auto">
        بيع
      </button>
    </div>

    <button id="accountHistoryBtn" class="btn-glass px-4 py-1">
      كشف الحساب
    </button>

    <div id="tradeHistory" class="mt-4 overflow-x-auto hidden">
      <table class="min-w-full text-right">
        <thead class="bg-white bg-opacity-10">
          <tr>
            <th class="p-2">التاريخ</th>
            <th class="p-2">العملية</th>
            <th class="p-2">العملة</th>
            <th class="p-2">الكمية</th>
            <th class="p-2">القيمة</th>
          </tr>
        </thead>
        <tbody id="tradeHistoryBody"></tbody>
      </table>
    </div>

  </div>
</div>
