<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - كربتو الخليج 💰</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="js/dashboard.js"></script>

  <style>
    body {background: linear-gradient(135deg,#0f172a,#020617);transition:.3s}
    .light {background: linear-gradient(135deg,#e2e8f0,#cbd5f5);color:black}

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
      transition:.3s
    }

    .glass:hover {transform: translateY(-5px)}

    .btn-glass {
      background: rgba(255,255,255,0.1);
      border-radius:12px;
      transition:.3s
      cursor: pointer;
    }

    .btn-glass:hover {background: rgba(255,255,255,0.2)}

    input,select {background:rgba(255,255,255,0.15)!important;color:white!important}
    .light input,.light select{color:black!important}

    .fade {animation:fade .5s}
    @keyframes fade {from{opacity:0}to{opacity:1}}
  </style>
</head>

<body id="body" class="text-white min-h-screen flex flex-col fade">

<nav class="glass flex justify-between items-center px-4 py-3 m-3">
  <div class="flex items-center gap-2">
    <img src="assets/logo.png" class="w-10 h-10 rounded-full">
    <h1 class="font-bold">كربتو الخليج 💰</h1>
  </div>

  <div class="flex gap-2 items-center">
    <button onclick="toggleMode()" class="btn-glass px-3 py-1">🌙</button>
    <a href="settings.html" class="btn-glass px-3 py-1">⚙️</a>
    <button id="logoutBtn" class="bg-red-500 px-3 py-1 rounded-lg">تسجيل الخروج</button>
  </div>
</nav>

<main class="flex-1 p-4 sm:p-6 max-w-6xl mx-auto w-full">

<!-- معلومات المستخدم -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-yellow-400">معلومات الحساب 👤</h2>
  <p id="userName"></p>
  <p id="userPhone"></p>
  <p id="userEmail"></p>
  <p id="walletId"></p>
</div>

<!-- الرصيد -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-green-400">💰 الرصيد الحالي</h2>
  <p id="balance" class="text-3xl">0 USDT</p>
</div>

<!-- أزرار الإيداع والسحب -->
<div class="flex flex-col sm:flex-row gap-4 mb-6">
  <button onclick="scrollToSection('depositSection')" class="btn-glass px-4 py-2 w-full sm:w-auto">💵 إيداع</button>
  <button onclick="scrollToSection('withdrawSection')" class="btn-glass px-4 py-2 w-full sm:w-auto">💸 سحب</button>
</div>

<!-- الإيداع -->
<div id="depositSection" class="glass p-6 mb-6 text-center">
  <h2 class="text-yellow-400 mb-3">إيداع USDT 💵</h2>
  <div class="flex flex-col items-center">
    <img src="assets/usdt_qr.png" class="w-40 mb-3 rounded-lg shadow-lg">
    <p class="text-sm break-all mb-2">0x7F8125C197B845E1F0682A9846B94A11cA9d9743</p>
    <button id="copyAddress" class="btn-glass px-3 py-1 mb-3">📋 نسخ العنوان</button>
    <p class="text-xs text-gray-300 mb-3">Only send Tether (ERC20) assets</p>
  </div>
  <input id="depositAmount" type="number" placeholder="أدخل المبلغ" class="p-2 rounded-lg w-40 text-center mb-2">
  <button id="depositBtn" class="bg-yellow-500 hover:bg-yellow-600 px-4 py-1 rounded-lg">تأكيد الإيداع</button>
</div>

<!-- السحب -->
<div id="withdrawSection" class="glass p-6 mb-6 text-center">
  <h2 class="text-yellow-400 mb-3">سحب USDT 💸</h2>
  <div class="flex flex-col gap-2">
    <input id="withdrawAmount" type="number" placeholder="أدخل المبلغ" class="p-2 rounded-lg">
    <input id="withdrawAddress" type="text" placeholder="أدخل عنوان محفظتك" class="p-2 rounded-lg">
    <button id="withdrawBtn" class="bg-yellow-500 hover:bg-yellow-600 py-2 rounded-lg mt-2">تأكيد السحب</button>
  </div>
</div>

<!-- التداول -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-yellow-400 mb-3">منصة التداول 📈</h2>
  <div class="flex flex-col gap-3">
    <div class="flex flex-col sm:flex-row gap-2 items-center">
      <select id="tradeAsset" class="p-2 rounded-lg w-full sm:w-1/3">
        <option>BTC</option>
        <option>ETH</option>
        <option>USDT</option>
      </select>
      <input id="tradeAmount" type="number" placeholder="الكمية" class="p-2 rounded-lg w-full sm:w-1/3 text-center">
      <button id="buyBtn" class="bg-green-600 px-4 py-1 rounded-lg">شراء</button>
      <button id="sellBtn" class="bg-red-600 px-4 py-1 rounded-lg">بيع</button>
    </div>
  </div>
</div>

<!-- الرسم البياني -->
<div class="glass p-6 mb-6 text-center">
  <h2 class="text-yellow-400 mb-3">📊 السوق المباشر</h2>
  <canvas id="chart"></canvas>
</div>

</main>

<div id="toast" class="fixed bottom-5 left-5 bg-green-500 px-4 py-2 rounded hidden"></div>

<script>
// 🌙 الوضع الليلي
function toggleMode(){document.getElementById('body').classList.toggle('light')}

// 🔔 إشعارات
function toast(msg){let t=document.getElementById('toast');t.innerText=msg;t.classList.remove('hidden');setTimeout(()=>t.classList.add('hidden'),2000)}

// ⚡ التمرير للأقسام
function scrollToSection(id){document.getElementById(id).scrollIntoView({behavior:'smooth'})}

// 📊 API سعر حقيقي (Binance)
let prices=[];
async function loadPrice(){
 let res=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
 let data=await res.json();
 let price=parseFloat(data.price);
 prices.push(price);
 if(prices.length>20) prices.shift();
 chart.data.labels=prices.map((_,i)=>i);
 chart.data.datasets[0].data=prices;
 chart.update();
}

// 📊 رسم بياني
const ctx=document.getElementById('chart');
const chart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[{label:'BTC',data:[]}]} });
setInterval(loadPrice,2000);

// 💰 حساب أرباح فعلي
let balance=1000;
document.getElementById('balance').innerText=balance+' USDT';

// شراء / بيع
document.getElementById('buyBtn').onclick=()=>{
 let amt=parseFloat(document.getElementById('tradeAmount').value||0);
 balance-=amt;
 document.getElementById('balance').innerText=balance+' USDT';
 toast('تم الشراء ✅');
}

document.getElementById('sellBtn').onclick=()=>{
 let amt=parseFloat(document.getElementById('tradeAmount').value||0);
 balance+=amt;
 document.getElementById('balance').innerText=balance+' USDT';
 toast('تم البيع 💸');
}
</script>

</body>
</html>
