<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - كربتو الخليج</title>
  <script type="module" src="js/login.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    body {background: linear-gradient(135deg, #0f172a, #020617); color: white;}
    .glass {background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 20px; border:1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: .3s;}
    .glass:hover {transform: translateY(-2px)}
    input {background: rgba(255,255,255,0.15) !important; color: white !important; border: 1px solid rgba(255,255,255,0.3);}
    input::placeholder {color: #ddd;}
    button {transition: .3s;}
    button:hover {transform: translateY(-1px);}
    a {color: #facc15;}
    a:hover {text-decoration: underline;}
  </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

  <div class="glass p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-yellow-400 mb-6">تسجيل الدخول</h1>

    <input id="email" type="email" placeholder="البريد الإلكتروني" class="w-full p-2 mb-3 rounded">
    <input id="password" type="password" placeholder="كلمة المرور" class="w-full p-2 mb-5 rounded">

    <button id="loginBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black py-2 rounded-lg">دخول</button>

    <p class="text-center text-gray-300 mt-4">ليس لديك حساب؟ <a href="register.html" class="font-semibold">إنشاء حساب</a></p>
  </div>

</body>
</html>
